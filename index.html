<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ガチャゲーム</title>

<style>

body{
    font-family:sans-serif;
    text-align:center;
    margin:0;
    padding-top:40px;
    background:linear-gradient(135deg,#2b2bff,#6dd5fa);
    color:white;
}

h1{
    font-size:42px;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:10px;
    margin:10px;
    cursor:pointer;
}

.single{
    background:gold;
}

.ten{
    background:#ff6b6b;
    color:white;
}

#result{
    margin-top:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:15px;
    max-width:600px;
    margin:20px auto;
}

.card{
    padding:20px;
    border-radius:12px;
    font-weight:bold;
}

.N{
    background:#ccc;
    color:black;
}

.R{
    background:#4caf50;
}

.SR{
    background:#2196f3;
}

.SSR{
    background:linear-gradient(45deg,gold,orange);
    color:black;
    animation:glow 1s infinite alternate;
}

@keyframes glow{
    from{box-shadow:0 0 10px gold;}
    to{box-shadow:0 0 30px yellow;}
}

.rainbow{
    animation:rainbow 2s linear infinite;
}

@keyframes rainbow{
0%{background:red}
20%{background:orange}
40%{background:yellow}
60%{background:green}
80%{background:blue}
100%{background:purple}
}

</style>
</head>

<body>

<h1>🎰 ガチャゲーム</h1>

<button class="single" onclick="draw(1)">単発ガチャ</button>
<button class="ten" onclick="draw(10)">10連ガチャ</button>

<div id="result"></div>

<script>

const characters=[
{name:"スライム",rarity:"N"},
{name:"ゴブリン",rarity:"N"},
{name:"ナイト",rarity:"R"},
{name:"エルフ",rarity:"R"},
{name:"ドラゴン",rarity:"SR"},
{name:"フェニックス",rarity:"SR"},
{name:"伝説の勇者",rarity:"SSR"}
];

function getRandomCharacter(){

let rand=Math.random()*100;

if(rand<60){
return characters[Math.floor(Math.random()*2)];
}
else if(rand<85){
return characters[2+Math.floor(Math.random()*2)];
}
else if(rand<97){
return characters[4+Math.floor(Math.random()*2)];
}
else{
return characters[6];
}

}

function draw(num){

const result=document.getElementById("result");
result.innerHTML="ガチャを引いています...";

setTimeout(()=>{

let html="";
let ssr=false;

if(num===1){

let char=getRandomCharacter();

if(char.rarity==="SSR"){
document.body.classList.add("rainbow");
ssr=true;
}

html=`<div class="card ${char.rarity}">
${char.rarity} ★ ${char.name}
</div>`;

}else{

html="<div class='grid'>";

for(let i=0;i<num;i++){

let char=getRandomCharacter();

if(char.rarity==="SSR"){
ssr=true;
}

html+=`<div class="card ${char.rarity}">
${char.rarity}<br>${char.name}
</div>`;

}

html+="</div>";

if(ssr){
document.body.classList.add("rainbow");
}

}

result.innerHTML=html;

setTimeout(()=>{
document.body.classList.remove("rainbow");
},2000);

},1000);

}

</script>

</body>
</html>
